<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      DOMAINE de production : https://minatoclubweb.vercel.app
      (à changer ici + robots.txt + sitemap.xml + llms.txt si tu branches un domaine perso).
    -->

    <!-- Primary Meta -->
    <title>Minato Club Web — Sites web premium pour TPE & PME | France, Belgique, Suisse</title>
    <meta
      name="description"
      content="Sites vitrines premium sur mesure pour TPE & PME en France, Belgique et Suisse. Design d'exception, référencement local (SEO), livraison rapide. Échange stratégique offert."
    />
    <meta name="author" content="Minato Club Web" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://minatoclubweb.vercel.app/" />

    <!-- Icons & Manifest -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#000000" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Minato Club Web" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Minato Club Web — Sites web premium pour TPE & PME" />
    <meta
      property="og:description"
      content="Design d'exception, référencement local et livraison rapide pour les entreprises de France, Belgique et Suisse. Échange stratégique offert."
    />
    <meta property="og:url" content="https://minatoclubweb.vercel.app/" />
    <meta property="og:image" content="https://minatoclubweb.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Minato Club Web — création de sites web premium" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Minato Club Web — Sites web premium pour TPE & PME" />
    <meta
      name="twitter:description"
      content="Design d'exception, référencement local et livraison rapide pour les entreprises de France, Belgique et Suisse."
    />
    <meta name="twitter:image" content="https://minatoclubweb.vercel.app/og-image.jpg" />

    <!-- Preconnect aux CDN vidéo : la connexion est ouverte tôt, la vidéo démarre plus vite -->
    <link rel="preconnect" href="https://d8j0ntlcm91z4.cloudfront.net" crossorigin />
    <link rel="preconnect" href="https://stream.mux.com" crossorigin />

    <!-- Fonts : preconnect + chargement non bloquant (remplace le @import du CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap"
    />

    <!-- Données structurées : Service professionnel + Site web -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "ProfessionalService",
          "@id": "https://minatoclubweb.vercel.app/#organization",
          "name": "Minato Club Web",
          "description": "Studio de création de sites vitrines premium sur mesure pour les TPE et PME en France, Belgique et Suisse.",
          "url": "https://minatoclubweb.vercel.app/",
          "email": "web-design-assistance@minatoclub.org",
          "image": "https://minatoclubweb.vercel.app/og-image.jpg",
          "logo": "https://minatoclubweb.vercel.app/favicon.svg",
          "priceRange": "€€",
          "serviceType": "Création de sites web",
          "knowsLanguage": ["fr"],
          "areaServed": [
            { "@type": "Country", "name": "France" },
            { "@type": "Country", "name": "Belgique" },
            { "@type": "Country", "name": "Suisse" }
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Formules de création de sites web",
            "itemListElement": [
              {
                "@type": "Offer",
                "name": "Édition Essentielle",
                "priceCurrency": "EUR",
                "price": "1290",
                "description": "Site vitrine sur mesure pour TPE & PME : design, rédaction locale, responsive, hébergement SSL, SEO local."
              },
              {
                "@type": "Offer",
                "name": "Pack Croissance",
                "priceCurrency": "EUR",
                "price": "3990",
                "description": "Pour les PME en expansion : prise de rendez-vous, SEO régional approfondi, rapports mensuels, support prioritaire."
              },
              {
                "@type": "Offer",
                "name": "Solutions Sur Mesure",
                "description": "E-commerce ou portail client haut de gamme, intégrations métiers (CRM, ERP, paiement), design exclusif. Sur devis."
              }
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://minatoclubweb.vercel.app/#website",
          "url": "https://minatoclubweb.vercel.app/",
          "name": "Minato Club Web",
          "inLanguage": "fr",
          "publisher": { "@id": "https://minatoclubweb.vercel.app/#organization" }
        },
        {
          "@type": "FAQPage",
          "@id": "https://minatoclubweb.vercel.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Le site m'appartient-il vraiment ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui, à 100 %. Une fois le solde réglé, le site et l'ensemble de son contenu sont votre propriété pleine et entière — code, textes et visuels compris."
              }
            },
            {
              "@type": "Question",
              "name": "Combien de temps faut-il pour livrer mon site ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Deux jours ouvrés en moyenne à partir de la validation de votre maquette. Vous êtes en ligne en quelques jours, pas en plusieurs mois."
              }
            },
            {
              "@type": "Question",
              "name": "Dois-je payer avant de voir le résultat ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Non. Vous validez d'abord la maquette de votre site. Aucun solde n'est dû tant que le design ne vous convient pas entièrement."
              }
            },
            {
              "@type": "Question",
              "name": "Je n'y connais rien en technique, est-ce un problème ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Aucunement. Nous gérons tout de A à Z : conception, rédaction, mise en ligne et hébergement. Vous n'avez qu'à partager votre vision, nous nous occupons du reste."
              }
            },
            {
              "@type": "Question",
              "name": "Mon site sera-t-il visible sur Google ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui. Chaque site est optimisé pour le référencement local (SEO) afin que vos clients de votre région vous trouvent facilement sur Google et Google Maps."
              }
            },
            {
              "@type": "Question",
              "name": "Puis-je demander des modifications ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Bien sûr. Des révisions sont incluses jusqu'à la validation de votre maquette, et des ajustements restent possibles ensuite selon votre formule d'accompagnement."
              }
            }
          ]
        }
      ]
    }
    </script>

    <!--
      Analytics Umami (sans cookie, conforme RGPD — aucun bandeau requis).
      ⚠️ Remplace VOTRE_WEBSITE_ID par l'ID fourni dans ton tableau de bord Umami
      (umami.is/cloud ou ton instance auto-hébergée). Tant que l'ID est le placeholder,
      le script est inerte et ne collecte rien.
    -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="VOTRE_WEBSITE_ID"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
